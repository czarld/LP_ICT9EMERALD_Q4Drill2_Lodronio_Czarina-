<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="styles.css">
</head>
<body style="background-color: rgb(99, 181, 244);">

    <div class="container text-center mt-5">
        <h1 class="mb-3">Heat Index Checker</h1>
        <p>Enter temperature and humidity, then click check to see heat index and its status.</p>




        <div class="card p-4 shadow">
            <div class="mb-3">
                <label>Temperature (°C)</label>
                <input type="number" id="temp" class="form-control">
            </div>

            <div class="mb-3">
                <label>Humidity (%)</label>
                <input type="number" id="humidity" class="form-control">
            </div>

            <button class="btn btn-primary" onclick="calculateHeatIndex()">Check Heat Index</button>

            <h2 class="mt-3" id="result"></h2>
            <h4 id="status"></h4>
        </div>

    </div>


    <script src="main.js"></script>
</body>
</html>
